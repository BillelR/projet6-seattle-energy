# bentofile.yaml
# ───────────────
# Fichier de configuration BentoML pour packager et déployer l'API.
#
# Commandes utiles :
#   bentoml build                    → crée le Bento (image packagée)
#   bentoml containerize seattle_energy_predictor:latest  → image Docker
#   bentoml serve service.py:svc     → lancement local
#
# ⚠️  Arrêtez le déploiement Cloud dès que vos tests sont terminés
#     pour ne pas consommer de ressources inutilement.

service: "service.py:svc"

labels:
  owner: data-engineer
  project: seattle-energy
  env: production

include:
  - "service.py"      # logique de l'API et endpoints
  - "save_model.py"   # script de réentraînement (optionnel, pour reproductibilité)
  - "test_api.py"     # script de test local

python:
  packages:
    - bentoml>=1.1.0
    - scikit-learn>=1.3.0
    - pandas>=2.0.0
    - numpy>=1.24.0
    - pydantic>=2.0.0

models:
  - "seattle_energy_model:latest"
