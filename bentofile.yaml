# bentofile.yaml
# ───────────────
# Fichier de configuration pour packager et déployer l'API FastAPI.
#
# Commandes utiles :
#   python3 save_model_pkl.py          → entraîne et sauvegarde le modèle
#   python3 -m uvicorn service:app --reload --port 8000  → lancement local
#   http://localhost:8000/docs         → interface Swagger
#
# ⚠️  Arrêtez le déploiement Cloud dès que vos tests sont terminés
#     pour ne pas consommer de ressources inutilement.

service: "service:app"

labels:
  owner: data-engineer
  project: seattle-energy
  env: production

include:
  - "service.py"          # logique de l'API FastAPI et endpoints
  - "save_model_pkl.py"   # script de réentraînement du modèle
  - "test_api.py"         # script de test local

python:
  packages:
    - fastapi>=0.100.0
    - uvicorn>=0.27.0
    - scikit-learn>=1.3.0
    - pandas>=2.0.0
    - numpy>=1.24.0
    - pydantic>=2.0.0
