# bentofile.yaml — VERSION CORRIGÉE
# ────────────────────────────────────
# Framework : FastAPI (harmonisé partout)
# Port      : 8000 (harmonisé partout)
#
# Commandes :
#   python3 save_model_pkl.py                              → génère model.pkl
#   python3 -m uvicorn service:app --reload --port 8000    → lancement local
#   http://localhost:8000/docs                             → Swagger UI

service: "service:app"

labels:
  owner: data-engineer
  project: seattle-energy
  env: production

include:
  - "service.py"          # API FastAPI — sans ENERGYSTARScore
  - "save_model_pkl.py"   # génération du modèle sans data leakage
  - "test_api.py"         # tests unitaires

python:
  packages:
    - fastapi>=0.100.0
    - uvicorn>=0.27.0
    - scikit-learn>=1.3.0
    - pandas>=2.0.0
    - numpy>=1.24.0
    - pydantic>=2.0.0
